    <text x="116" y="248" fill="#F4E7CD" font-family="Georgia, serif" font-size="74" font-weight="700">LaCampaniaOnline</text>
    <text x="116" y="310" fill="#BFAF95" font-family="Georgia, serif" font-size="26">La Campaña llevada a web con motor de reglas, salas y combate en vivo.</text>
  </g>

  <g filter="url(#shadow)">
