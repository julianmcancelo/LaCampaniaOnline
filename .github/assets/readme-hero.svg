      <rect x="570" y="442" width="146" height="72" rx="18" fill="#EEEAF6" stroke="#7B6DA5" stroke-width="1.5"/>
      <text x="588" y="483" fill="#6A5E9A" font-family="Georgia, serif" font-size="30" font-weight="700">Arquero</text>
      <text x="574" y="435" fill="#7B6DA5" font-family="Georgia, serif" font-size="12" letter-spacing="3">UNIDAD</text>
    </g>
  </g>

  <g>
    <rect x="840" y="270" width="300" height="246" rx="28" fill="#0E241A" fill-opacity="0.84" stroke="#C69C4B" stroke-opacity="0.28" stroke-width="2"/>
    <text x="874" y="332" fill="#D7A52F" font-family="Georgia, serif" font-size="18" letter-spacing="5">REGLAS OFICIALES</text>
    <text x="874" y="386" fill="#F4E7CD" font-family="Georgia, serif" font-size="40" font-weight="700">Match + Battle</text>
    <text x="874" y="426" fill="#BFAF95" font-family="Georgia, serif" font-size="22">2 a 5 jugadores</text>
    <text x="874" y="460" fill="#BFAF95" font-family="Georgia, serif" font-size="22">Modo individual y alianzas</text>
    <text x="874" y="494" fill="#BFAF95" font-family="Georgia, serif" font-size="22">Socket.io + Next.js 14</text>
    <rect x="874" y="532" width="208" height="12" rx="6" fill="#2C4435"/>
    <rect x="874" y="532" width="112" height="12" rx="6" fill="url(#accent)">
      <animate attributeName="width" values="72;170;112;150;112" dur="6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g opacity="0.88">
