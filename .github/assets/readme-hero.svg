    <rect x="96" y="384" width="680" height="188" rx="30" stroke="#C69C4B" stroke-opacity="0.28" stroke-width="2"/>

    <g opacity="0.95">
      <rect x="134" y="418" width="186" height="120" rx="22" fill="#F8F1E5" stroke="#C5A46A" stroke-width="1.5"/>
