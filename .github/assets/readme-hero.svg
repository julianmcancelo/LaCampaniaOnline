      <rect x="362" y="442" width="146" height="72" rx="18" fill="#F0E7DA" stroke="#B9835D" stroke-width="1.5"/>
      <text x="376" y="483" fill="#946244" font-family="Georgia, serif" font-size="30" font-weight="700">Caballero</text>
      <text x="366" y="435" fill="#B9835D" font-family="Georgia, serif" font-size="12" letter-spacing="3">UNIDAD</text>
    </g>

    <g opacity="0.97">
