<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="1160" y2="680" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#183629">
        <animate attributeName="stop-color" values="#183629;#214737;#183629" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.55" stop-color="#0D2318"/>
      <stop offset="1" stop-color="#08130F"/>
    </linearGradient>
    <radialGradient id="goldGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(954 163) rotate(136.102) scale(583.578 523.881)">
      <stop stop-color="#F2D48D" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#F2D48D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="board" x1="640" y1="154" x2="640" y2="586" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F0E3CC"/>
      <stop offset="1" stop-color="#DFC8A0"/>
    </linearGradient>
    <linearGradient id="accent" x1="846" y1="274" x2="1118" y2="522" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F1D185"/>
      <stop offset="1" stop-color="#A66A17"/>
    </linearGradient>
    <filter id="blur" x="-120" y="-120" width="1520" height="960" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="shadow" x="0" y="0" width="1280" height="720" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <pattern id="grain" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M0 28C35 16 66 15 120 36" stroke="#8E6B3A" stroke-opacity="0.08" stroke-width="2"/>
      <path d="M-12 70C34 53 81 58 132 88" stroke="#7A5730" stroke-opacity="0.06" stroke-width="2"/>
      <path d="M8 106C54 94 88 98 140 116" stroke="#A77A45" stroke-opacity="0.08" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="1280" height="720" rx="32" fill="url(#bg)"/>
  <rect width="1280" height="720" rx="32" fill="url(#grain)"/>
  <g filter="url(#blur)">
    <circle cx="1035" cy="168" r="188" fill="url(#goldGlow)">
      <animate attributeName="cx" values="1035;1005;1035" dur="12s" repeatCount="indefinite"/>
