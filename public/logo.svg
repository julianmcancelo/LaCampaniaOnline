<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <clipPath id="inner-clip">
      <circle cx="400" cy="400" r="287"/>
    </clipPath>
    <radialGradient id="sunset" cx="50%" cy="72%" r="65%">
      <stop offset="0%"  stop-color="#FFD000"/>
      <stop offset="18%" stop-color="#FF8800"/>
      <stop offset="50%" stop-color="#B84800"/>
      <stop offset="80%" stop-color="#5A1E00"/>
      <stop offset="100%" stop-color="#1E0800"/>
    </radialGradient>
    <radialGradient id="frame-bg" cx="50%" cy="50%" r="50%">
      <stop offset="60%"  stop-color="#3A1800"/>
      <stop offset="100%" stop-color="#200C00"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── FONDO NEGRO ── -->
  <rect width="800" height="800" fill="#080808"/>

  <!-- ── MARCO EXTERIOR ── -->
  <!-- Anillo marrón oscuro del marco -->
  <circle cx="400" cy="400" r="375" fill="#1E0900"/>
  <circle cx="400" cy="400" r="372" fill="url(#frame-bg)"/>

  <!-- Borde exterior dorado -->
  <circle cx="400" cy="400" r="372" fill="none" stroke="#D4A017" stroke-width="3.5"/>

  <!-- TEXTURA DE SOGA: dos series de trazos entrelazados -->
  <circle cx="400" cy="400" r="336" fill="none" stroke="#6B3800" stroke-width="44"/>
  <circle cx="400" cy="400" r="336" fill="none" stroke="#C08020" stroke-width="9"
          stroke-dasharray="18 14" stroke-linecap="round"/>
  <circle cx="400" cy="400" r="336" fill="none" stroke="#8B5010" stroke-width="9"
          stroke-dasharray="18 14" stroke-linecap="round" stroke-dashoffset="16"/>
  <circle cx="400" cy="400" r="336" fill="none" stroke="#D4A017" stroke-width="2.5"
          stroke-dasharray="6 26" stroke-linecap="round" stroke-dashoffset="3"/>

  <!-- Bordes dorados del aro de soga -->
  <circle cx="400" cy="400" r="358" fill="none" stroke="#D4A017" stroke-width="3"/>
  <circle cx="400" cy="400" r="314" fill="none" stroke="#D4A017" stroke-width="3"/>

  <!-- Filigrana dentro del marco (scrolls en todo el aro) -->
  <!-- Top -->
  <path d="M 370,35 C 360,45 355,60 365,68 C 375,60 385,55 400,52 C 415,55 425,60 435,68 C 445,60 440,45 430,35"
        stroke="#C4900F" stroke-width="2.5" fill="none"/>
  <!-- Bottom -->
  <path d="M 370,765 C 360,755 355,740 365,732 C 375,740 385,745 400,748 C 415,745 425,740 435,732 C 445,740 440,755 430,765"
        stroke="#C4900F" stroke-width="2.5" fill="none"/>
  <!-- Left scrolls -->
  <path d="M 42,340 C 30,355 28,375 42,390 C 28,405 30,425 42,440" stroke="#C4900F" stroke-width="2.5" fill="none"/>
  <path d="M 52,345 C 44,358 42,373 52,385 C 42,397 44,412 52,425" stroke="#C4900F" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Right scrolls -->
  <path d="M 758,340 C 770,355 772,375 758,390 C 772,405 770,425 758,440" stroke="#C4900F" stroke-width="2.5" fill="none"/>
  <path d="M 748,345 C 756,358 758,373 748,385 C 758,397 756,412 748,425" stroke="#C4900F" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- ── INTERIOR: PUESTA DE SOL ── -->
  <circle cx="400" cy="400" r="290" fill="url(#sunset)"/>

  <!-- Contenido interior recortado -->
  <g clip-path="url(#inner-clip)">

    <!-- Colinas / horizonte -->
    <path d="M 113,510 C 155,470 205,482 255,505 C 300,485 355,492 400,510
             C 445,492 500,485 545,505 C 595,482 645,470 687,510 L 687,700 L 113,700 Z"
          fill="#280C00" opacity="0.9"/>

    <!-- Suelo -->
    <rect x="113" y="560" width="574" height="240" fill="#180600"/>

    <!-- Árbol izquierda -->
    <rect x="190" y="440" width="11" height="135" fill="#0C0400"/>
    <ellipse cx="196" cy="415" rx="40" ry="52" fill="#0C0400"/>

    <!-- Construcción derecha (rancho) -->
    <rect x="572" y="488" width="82" height="75" fill="#0C0400"/>
    <path d="M 565,488 L 660,488 L 660,476 L 613,458 L 565,476 Z" fill="#0A0300"/>
    <rect x="595" y="510" width="18" height="25" fill="#140600"/>

    <!-- Pájaros -->
    <path d="M 522,345 Q 530,337 538,345" stroke="#100500" stroke-width="2.5" fill="none"/>
    <path d="M 542,355 Q 550,347 558,355" stroke="#100500" stroke-width="2.5" fill="none"/>
    <path d="M 576,338 Q 583,331 590,338" stroke="#100500" stroke-width="2" fill="none"/>
    <path d="M 612,350 Q 618,344 624,350" stroke="#100500" stroke-width="2" fill="none"/>

    <!-- ── SILUETA CABALLO + JINETE ── -->
    <!-- Cuerpo del caballo -->
    <ellipse cx="390" cy="528" rx="105" ry="44" fill="#060200" transform="rotate(-6,390,528)"/>
    <ellipse cx="298" cy="524" rx="58" ry="40" fill="#060200"/>
    <ellipse cx="468" cy="510" rx="45" ry="40" fill="#060200"/>
    <!-- Cuello -->
    <path d="M 468,490 Q 495,460 508,432" stroke="#060200" stroke-width="32" fill="none" stroke-linecap="round"/>
    <!-- Cabeza -->
    <ellipse cx="514" cy="421" rx="23" ry="15" fill="#060200" transform="rotate(-22,514,421)"/>
    <!-- Oreja -->
    <path d="M 505,408 L 500,396 L 510,406" fill="#060200"/>
    <!-- Melena -->
    <path d="M 492,430 Q 480,445 468,448" stroke="#060200" stroke-width="8" fill="none" stroke-linecap="round"/>

    <!-- Patas delanteras (galope extendido) -->
    <path d="M 455,548 L 432,592 L 437,624" stroke="#060200" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 476,552 L 508,592 L 506,626" stroke="#060200" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Patas traseras -->
    <path d="M 315,552 L 290,594 L 296,628" stroke="#060200" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 348,558 L 338,596 L 358,624" stroke="#060200" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Cola -->
    <path d="M 268,515 C 248,528 233,550 237,574" stroke="#060200" stroke-width="16" fill="none" stroke-linecap="round"/>
    <path d="M 265,522 C 243,538 228,560 232,582" stroke="#060200" stroke-width="9" fill="none" stroke-linecap="round"/>

    <!-- Jinete: cuerpo -->
    <ellipse cx="388" cy="488" rx="21" ry="30" fill="#060200"/>
    <!-- Piernas montadas -->
    <path d="M 372,512 L 355,538" stroke="#060200" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M 404,512 L 422,538" stroke="#060200" stroke-width="11" fill="none" stroke-linecap="round"/>
    <!-- Cabeza del jinete -->
    <circle cx="386" cy="462" r="15" fill="#060200"/>
    <!-- Sombrero (ala) -->
    <ellipse cx="386" cy="450" rx="24" ry="6" fill="#060200"/>
    <!-- Corona del sombrero -->
    <path d="M 370,450 C 368,432 404,432 402,450 Z" fill="#060200"/>
    <!-- Pelo volando -->
    <path d="M 373,468 C 356,478 340,488 330,494" stroke="#060200" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Brazo con riendas -->
    <path d="M 390,490 C 412,484 428,478 440,472" stroke="#060200" stroke-width="9" fill="none" stroke-linecap="round"/>
    <path d="M 440,472 C 460,460 490,450 510,442" stroke="#060200" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7"/>

  </g><!-- /clip interior -->

  <!-- Borde interior del marco (sobre el clip) -->
  <circle cx="400" cy="400" r="290" fill="none" stroke="#D4A017" stroke-width="4.5"/>

  <!-- ── OBJETOS SOBRE EL MARCO ── -->

  <!-- SOMBRERO (arriba izquierda, ~11h) -->
  <g transform="translate(222,228) rotate(-38)">
    <!-- Ala -->
    <ellipse cx="0" cy="0" rx="54" ry="14" fill="#5A2800" stroke="#D4A017" stroke-width="2.5"/>
    <!-- Tiro hacia abajo del ala -->
    <path d="M -54,0 C -44,18 44,18 54,0" stroke="#5A2800" stroke-width="4" fill="none"/>
    <!-- Copa -->
    <path d="M -24,-4 C -26,-46 26,-46 24,-4 Z" fill="#5A2800" stroke="#D4A017" stroke-width="2.5"/>
    <!-- Cinta -->
    <path d="M -24,-4 C 0,-10 24,-4" stroke="#3A1500" stroke-width="5" fill="none"/>
    <path d="M -24,-4 C 0,0 24,-4" stroke="#D4A017" stroke-width="1" fill="none"/>
    <!-- Cordón del mentón -->
    <path d="M -44,8 C -32,22 32,22 44,8" stroke="#4A2000" stroke-width="3" fill="none"/>
    <circle cx="-10" cy="25" r="4" fill="#4A2000" stroke="#D4A017" stroke-width="1"/>
  </g>

  <!-- MATE (arriba centro, 12h) -->
  <g transform="translate(400,190)">
    <!-- Cuerpo del mate (pera) -->
    <path d="M -23,-8 C -28,40 28,40 23,-8 Z" fill="#5A2800" stroke="#D4A017" stroke-width="2.5"/>
    <!-- Boca del mate -->
    <ellipse cx="0" cy="-8" rx="23" ry="8" fill="#3A1500" stroke="#D4A017" stroke-width="2"/>
    <!-- Aro de plata -->
    <ellipse cx="0" cy="-8" rx="23" ry="8" fill="none" stroke="#C8A850" stroke-width="3"/>
    <!-- Textura cuero -->
    <path d="M -21,5 C -5,2 5,2 21,5" stroke="#3A1500" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M -22,16 C -5,13 5,13 22,16" stroke="#3A1500" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M -21,27 C -5,24 5,24 21,27" stroke="#3A1500" stroke-width="2" fill="none" opacity="0.6"/>
    <!-- Bombilla -->
    <path d="M 7,-12 C 12,-35 20,-58 25,-78" stroke="#B8A040" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Filtro de la bombilla -->
    <ellipse cx="27" cy="-82" rx="7" ry="5" fill="#707050" stroke="#B8A040" stroke-width="1.5"/>
    <line x1="20" y1="-80" x2="34" y2="-80" stroke="#B8A040" stroke-width="1.5"/>
  </g>

  <!-- FACÓN (arriba derecha, ~1h) -->
  <g transform="translate(590,232) rotate(38)">
    <!-- Hoja (blade) -->
    <path d="M 0,-72 C 11,-42 9,0 2,14 C 0,5 -2,0 0,-72 Z" fill="#D8D8C8" stroke="#9A8828" stroke-width="1"/>
    <!-- Filo -->
    <path d="M 0,-72 C -2,-42 -1,0 -1,12" stroke="#F0F0E8" stroke-width="1.5" fill="none" opacity="0.7"/>
    <!-- Ranura del filo -->
    <path d="M 2,-62 C 3,-35 3,0 2,12" stroke="#B0B0A0" stroke-width="1.5" fill="none" opacity="0.5"/>
    <!-- Guarda -->
    <path d="M -11,12 Q -10,22 10,22 Q 11,12 -11,12 Z" fill="#8B6914" stroke="#D4A017" stroke-width="1.5"/>
    <ellipse cx="0" cy="12" rx="11" ry="4" fill="#6B4A10" stroke="#D4A017" stroke-width="1"/>
    <!-- Mango -->
    <rect x="-7" y="20" width="14" height="40" rx="3" fill="#5A2800" stroke="#8B6914" stroke-width="1.5"/>
    <!-- Decoración del mango -->
    <rect x="-7" y="20" width="14" height="6" rx="1" fill="#4A1800" opacity="0.8"/>
    <rect x="-7" y="50" width="14" height="6" rx="1" fill="#4A1800" opacity="0.8"/>
    <path d="M -6,27 L 6,27" stroke="#8B6914" stroke-width="1.5"/>
    <path d="M -6,32 L 6,32" stroke="#8B6914" stroke-width="1.5"/>
    <path d="M -6,37 L 6,37" stroke="#8B6914" stroke-width="1.5"/>
    <path d="M -6,42 L 6,42" stroke="#8B6914" stroke-width="1.5"/>
    <path d="M -6,47 L 6,47" stroke="#8B6914" stroke-width="1.5"/>
    <!-- Pomo -->
    <ellipse cx="0" cy="63" rx="9" ry="6" fill="#8B6914" stroke="#D4A017" stroke-width="1.5"/>
  </g>

  <!-- ── LETRAS G y A EN EL MARCO ── -->
  <text x="124" y="422" font-family="Georgia,'Times New Roman',serif" font-size="54" font-weight="bold"
        fill="#D4A017" text-anchor="middle" filter="url(#glow)">G</text>
  <text x="676" y="422" font-family="Georgia,'Times New Roman',serif" font-size="54" font-weight="bold"
        fill="#D4A017" text-anchor="middle" filter="url(#glow)">A</text>

  <!-- ── ORNAMENTO SUPERIOR (flor de lis / cairel) ── -->
  <g transform="translate(400,38)" filter="url(#glow)">
    <!-- Pétalo central -->
    <path d="M 0,0 C -10,16 -20,24 -16,40 C -8,33 -2,38 0,50 C 2,38 8,33 16,40 C 20,24 10,16 0,0 Z" fill="#D4A017"/>
    <!-- Pétalos laterales -->
    <path d="M -16,40 C -28,32 -36,18 -28,8 C -18,14 -10,22 0,0" fill="#C49010" opacity="0.8"/>
    <path d="M  16,40 C  28,32  36,18  28,8 C  18,14  10,22  0,0" fill="#C49010" opacity="0.8"/>
    <!-- Punto superior -->
    <circle cx="0" cy="-5" r="6" fill="#D4A017"/>
    <!-- Brazos curvos -->
    <path d="M -28,8 C -42,6 -50,16 -46,28 C -40,36 -30,32 -32,22" stroke="#D4A017" stroke-width="3.5" fill="none"/>
    <path d="M  28,8 C  42,6  50,16  46,28 C  40,36  30,32  32,22" stroke="#D4A017" stroke-width="3.5" fill="none"/>
    <!-- Líneas base -->
    <line x1="-52" y1="18" x2="52" y2="18" stroke="#D4A017" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- ── ORNAMENTO INFERIOR ── -->
  <g transform="translate(400,762)" filter="url(#glow)">
    <!-- Espejo del superior -->
    <path d="M 0,0 C -10,-16 -20,-24 -16,-40 C -8,-33 -2,-38 0,-50 C 2,-38 8,-33 16,-40 C 20,-24 10,-16 0,0 Z" fill="#D4A017"/>
    <path d="M -16,-40 C -28,-32 -36,-18 -28,-8 C -18,-14 -10,-22 0,0" fill="#C49010" opacity="0.8"/>
    <path d="M  16,-40 C  28,-32  36,-18  28,-8 C  18,-14  10,-22  0,0" fill="#C49010" opacity="0.8"/>
    <circle cx="0" cy="5" r="6" fill="#D4A017"/>
    <path d="M -28,-8 C -42,-6 -50,-16 -46,-28 C -40,-36 -30,-32 -32,-22" stroke="#D4A017" stroke-width="3.5" fill="none"/>
    <path d="M  28,-8 C  42,-6  50,-16  46,-28 C  40,-36  30,-32  32,-22" stroke="#D4A017" stroke-width="3.5" fill="none"/>
    <!-- Barras horizontales -->
    <line x1="-55" y1="-25" x2="55" y2="-25" stroke="#D4A017" stroke-width="3"/>
    <line x1="-40" y1="-36" x2="40" y2="-36" stroke="#D4A017" stroke-width="2"/>
  </g>

  <!-- Detalles filigrana en el marco (esquinas del aro) -->
  <!-- Izquierda arriba -->
  <path d="M 105,198 C 122,185 140,188 150,200 C 138,208 125,205 118,215" stroke="#C4900F" stroke-width="2" fill="none"/>
  <!-- Derecha arriba -->
  <path d="M 695,198 C 678,185 660,188 650,200 C 662,208 675,205 682,215" stroke="#C4900F" stroke-width="2" fill="none"/>
  <!-- Izquierda abajo -->
  <path d="M 105,602 C 122,615 140,612 150,600 C 138,592 125,595 118,585" stroke="#C4900F" stroke-width="2" fill="none"/>
  <!-- Derecha abajo -->
  <path d="M 695,602 C 678,615 660,612 650,600 C 662,592 675,595 682,585" stroke="#C4900F" stroke-width="2" fill="none"/>

</svg>
